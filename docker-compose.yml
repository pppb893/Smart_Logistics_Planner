services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: smart_logistics_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: logistics_db
      MYSQL_USER: dbuser
      MYSQL_PASSWORD: dbpassword
    # ports:
    #   - "3307:3306" # Removed to avoid host port conflicts. Backend connects internally.
    volumes:
      - mysql_data:/var/lib/mysql

  # Backend Server
  backend:
    build:
      context: ./Backend
    container_name: smart_logistics_backend
    ports:
      - "5001:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - DB_HOST=mysql
      - DB_USER=dbuser
      - DB_PASSWORD=dbpassword
      - DB_NAME=logistics_db
    env_file: ./Backend/.env
    depends_on:
      - mysql

  # Frontend App
  frontend:
    build:
      context: ./Frontend
    container_name: smart_logistics_frontend
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    env_file:
      - ./Frontend/.env
    volumes:
      - ./Frontend/src:/app/src # Hot reload for local development

volumes:
  mysql_data:
